<head>
<meta charset="UTF-8"/>

<title>海浪品类财务数据系统 2025 vs 2026（完整版）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1117;color:#E6EDF3;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;font-size:13px;display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:200px;background:#161B22;border-right:1px solid #30363D;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo{padding:16px;border-bottom:1px solid #30363D}
.logo-title{font-size:13px;font-weight:700;color:#58A6FF;letter-spacing:1px}
.logo-sub{font-size:10px;color:#8B949E;margin-top:2px}
.nav{padding:8px 0}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:12px;color:#8B949E;transition:.15s;border:none;background:none;width:100%;text-align:left;white-space:nowrap}
.nav-item:hover{background:#21262D;color:#E6EDF3}
.nav-item.active{background:rgba(88,166,255,.15);color:#58A6FF;border-left:2px solid #58A6FF}
.nav-icon{font-size:14px;flex-shrink:0}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#161B22;border-bottom:1px solid #30363D;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700}
.topbar-sub{font-size:11px;color:#8B949E;margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge.red{background:rgba(248,81,73,.15);color:#F85149}
.badge.green{background:rgba(63,185,80,.15);color:#3FB950}
.content{flex:1;overflow-y:auto;padding:20px}
/* CARDS */
.page{display:none}.page.active{display:block}
.section-title{font-size:14px;font-weight:700;color:#58A6FF;border-bottom:1px solid #30363D;padding-bottom:8px;margin-bottom:16px}
.section-sub{font-size:11px;color:#8B949E;margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:16px}
.card{background:#161B22;border:1px solid #30363D;border-radius:8px;padding:14px}
.card-label{font-size:10px;color:#8B949E;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.card-val{font-size:20px;font-weight:700;color:#E6EDF3}
.card-val.small{font-size:15px}
.card-chg{font-size:11px;margin-top:4px}
.green{color:#3FB950}.red{color:#F85149}.blue{color:#58A6FF}.muted{color:#8B949E}.yellow{color:#E3B341}.purple{color:#BC8CFF}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
.tbl th{padding:8px 10px;font-size:10px;font-weight:600;color:#8B949E;background:#0D1117;text-align:left;border-bottom:1px solid #30363D;white-space:nowrap;position:sticky;top:0;z-index:1}
.tbl td{padding:7px 10px;border-bottom:1px solid #21262D;vertical-align:top}
.tbl tr:hover td{background:#21262D}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums}
.tbl .cat{font-weight:600;color:#58A6FF}
/* CHART CONTAINER */
.chart-wrap{background:#161B22;border:1px solid #30363D;border-radius:8px;padding:14px;margin-bottom:16px}
.chart-title{font-size:12px;font-weight:600;color:#8B949E;margin-bottom:10px}
canvas{display:block}
/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:#161B22;border:1px solid #30363D;border-radius:8px;padding:12px 14px}
.kpi-label{font-size:10px;color:#8B949E;margin-bottom:4px}
.kpi-val{font-size:18px;font-weight:700}
.kpi-sub{font-size:10px;color:#8B949E;margin-top:2px}
/* DETAIL BREAKDOWN */
.breakdown-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}
.breakdown-card{background:#161B22;border:1px solid #30363D;border-radius:8px;padding:14px}
.breakdown-title{font-size:12px;font-weight:700;color:#58A6FF;margin-bottom:10px;border-bottom:1px solid #30363D;padding-bottom:6px}
.brow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #21262D;font-size:11px}
.brow:last-child{border-bottom:none}
.brow-label{color:#8B949E}
.brow-val{font-weight:600}
.brow-val.pos{color:#3FB950}.brow-val.neg{color:#F85149}.brow-val.neu{color:#E6EDF3}
/* YOY BADGE */
.yoy{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:600}
.yoy.up{background:rgba(63,185,80,.15);color:#3FB950}
.yoy.down{background:rgba(248,81,73,.15);color:#F85149}
/* TABS */
.tab-bar{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{padding:5px 12px;border-radius:6px;border:1px solid #30363D;background:none;color:#8B949E;font-size:11px;cursor:pointer;transition:.15s}
.tab-btn.active,.tab-btn:hover{background:#21262D;color:#E6EDF3;border-color:#58A6FF}
.tab-panel{display:none}.tab-panel.active{display:block}
/* SCROLLABLE TABLE WRAPPER */
.tbl-wrap{overflow-x:auto;margin-bottom:16px}
/* FILTER ROW */
.filter-row{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.filter-row select,.filter-row input{background:#21262D;border:1px solid #30363D;color:#E6EDF3;padding:5px 10px;border-radius:6px;font-size:12px}
.filter-row label{font-size:11px;color:#8B949E}
/* HEATMAP */
.heatmap-cell{text-align:center;padding:10px 6px;border-radius:6px;font-size:12px;font-weight:600}
/* PROGRESS BAR */
.prog-bar{height:6px;background:#21262D;border-radius:3px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:3px;transition:.3s}
/* WATERFALL */
.wf-bar{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:11px}
.wf-label{width:140px;color:#8B949E;flex-shrink:0;text-align:right}
.wf-track{flex:1;position:relative;height:18px;background:#21262D;border-radius:3px;overflow:hidden}
.wf-seg{position:absolute;top:0;height:100%;border-radius:2px}
.wf-amount{width:80px;text-align:right;flex-shrink:0;font-weight:600}
</style>
</head>

function g(obj, key, def=0){ return (obj && obj[key] !== undefined && obj[key] !== null) ? obj[key] : def; }
function yuan(v){ if(v===null||v===undefined) return '-'; return '¥' + Number(v).toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function pct(v,d=1){ if(v===null||v===undefined) return '-'; return (v*100).toFixed(d)+'%'; }
function yoy(v26,v25){
  if(!v25) return '';
  const chg = (v26-v25)/Math.abs(v25);
  const cls = chg>=0?'up':'down';
  const sign = chg>=0?'▲':'▼';
  return `<span class="yoy ${cls}">${sign}${Math.abs(chg*100).toFixed(1)}%</span>`;
}
function colorVal(v, pctMode=false){
  const num = pctMode ? v*100 : v;
  const cls = v>0?'green':v<0?'red':'muted';
  return `<span class="${cls}">${pctMode?pct(v):yuan(v)}</span>`;
}
function spark(val,total,color='#58A6FF'){
  const p = total ? Math.min(100, Math.abs(val/total)*100) : 0;
  return `<div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${color}"></div></div>`;
}

// ===== CANVAS CHART UTILS =====
function clearCanvas(cv){ cv.getContext('2d').clearRect(0,0,cv.width,cv.height); }

function drawBarChart(cv, labels, datasets, opts={}){
  const ctx = cv.getContext('2d');
  const W=cv.width, H=cv.height;
  const pad={t:30,r:20,b:55,l:65};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  const n=labels.length, ds=datasets.length;
  const bw=Math.min(40, cw/(n*ds+n)*0.8);
  const gap=bw*0.3;
  const allVals=datasets.flatMap(d=>d.data);
  const hasNeg=allVals.some(v=>v<0);
  let mn=hasNeg?Math.min(0,...allVals):0, mx=Math.max(...allVals)*1.1||1;
  if(mn<0) mn=mn*1.1;
  const range=mx-mn;
  function fy(v){ return pad.t+ch-(v-mn)/range*ch; }
  const zero=fy(0);
  // grid
  ctx.strokeStyle='#21262D'; ctx.lineWidth=1;
  for(let i=0;i<=5;i++){
    const y=pad.t+i*ch/5;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke();
    const val=mx-(mx-mn)*i/5;
    ctx.fillStyle='#8B949E'; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText(opts.pct?pct(val/100):yuan(val), pad.l-5, y+4);
  }
  // zero line
  if(hasNeg){
    ctx.strokeStyle='#484F58'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pad.l,zero); ctx.lineTo(pad.l+cw,zero); ctx.stroke();
  }
  // bars
  datasets.forEach((ds2,di)=>{
    ctx.fillStyle=ds2.color||'#58A6FF';
    ds2.data.forEach((v,i)=>{
      const x=pad.l+i*(ds*bw+(ds+1)*gap)+(di*bw)+gap;
      const y1=fy(Math.max(0,v)), y2=fy(Math.min(0,v));
      ctx.fillRect(x, Math.min(y1,y2), bw, Math.abs(y2-y1)||1);
    });
  });
  // x labels
  ctx.fillStyle='#8B949E'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  labels.forEach((lbl,i)=>{
    const x=pad.l+i*(ds*bw+(ds+1)*gap)+ds*bw/2+gap;
    ctx.fillText(lbl, x, H-pad.b+16);
  });
  // legend
  if(datasets.length>1){
    let lx=pad.l;
    datasets.forEach(d=>{
      ctx.fillStyle=d.color||'#58A6FF';
      ctx.fillRect(lx,12,12,10);
      ctx.fillStyle='#8B949E'; ctx.font='10px sans-serif'; ctx.textAlign='left';
      ctx.fillText(d.label||'', lx+16, 21);
      lx+=ctx.measureText(d.label||'').width+36;
    });
  }
}

  const range=mx-mn||1;
  function fx(i){ return pad.l+i/(labels.length-1)*cw; }
  function fy(v){ return pad.t+ch-(v-mn)/range*ch; }
  // grid
  ctx.strokeStyle='#21262D'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+i*ch/4;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke();
    const val=mx-(mx-mn)*i/4;
    ctx.fillStyle='#8B949E'; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText(opts.pct?pct(val/100):yuan(val), pad.l-5, y+4);
  }
  datasets.forEach(ds=>{
    ctx.strokeStyle=ds.color||'#58A6FF'; ctx.lineWidth=2;
    ctx.beginPath();
    ds.data.forEach((v,i)=>{ i===0?ctx.moveTo(fx(i),fy(v)):ctx.lineTo(fx(i),fy(v)); });
    ctx.stroke();
    ds.data.forEach((v,i)=>{
      ctx.fillStyle=ds.color||'#58A6FF';
      ctx.beginPath(); ctx.arc(fx(i),fy(v),3,0,Math.PI*2); ctx.fill();
    });
  });
  ctx.fillStyle='#8B949E'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  labels.forEach((lbl,i)=>ctx.fillText(lbl, fx(i), H-pad.b+14));
  if(datasets.length>1){
    let lx=pad.l;
    datasets.forEach(d=>{
      ctx.strokeStyle=d.color; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(lx,16); ctx.lineTo(lx+16,16); ctx.stroke();
      ctx.fillStyle='#8B949E'; ctx.font='10px sans-serif'; ctx.textAlign='left';
      ctx.fillText(d.label||'',lx+20,20);
      lx+=ctx.measureText(d.label||'').width+46;
    });
  }
}

function drawPieChart(cv, labels, values, colors){
  const ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);
  const cx=W*0.38, cy=H/2, r=Math.min(cx,cy)*0.75;
  const total=values.reduce((a,b)=>a+b,0)||1;
  let angle=-Math.PI/2;
  values.forEach((v,i)=>{
    const slice=v/total*Math.PI*2;
    ctx.fillStyle=colors[i%colors.length];
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,angle,angle+slice); ctx.closePath(); ctx.fill();
    angle+=slice;
  });
  // legend
  const lx=W*0.72, ly=H/2-(labels.length*18)/2;
  labels.forEach((lbl,i)=>{
    ctx.fillStyle=colors[i%colors.length];
    ctx.fillRect(lx,ly+i*22,12,12);
    ctx.fillStyle='#E6EDF3'; ctx.font='11px sans-serif'; ctx.textAlign='left';
    ctx.fillText(`${lbl} (${pct(values[i]/total)})`, lx+18, ly+i*22+11);
  });
}

function drawStackedBar(cv, cats, datasets, opts={}){
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  const pad={t:30,r:20,b:50,l:70};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  const totals=cats.map((_,i)=>datasets.reduce((s,d)=>s+Math.abs(d.data[i]),0));
  const mx=Math.max(...totals)*1.1||1;
  const bw=Math.min(50, cw/(cats.length+1));
  const step=cw/cats.length;
  function fy(v){ return pad.t+ch-v/mx*ch; }
  // grid
  ctx.strokeStyle='#21262D'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+i*ch/4;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke();
    const val=mx*(1-i/4);
    ctx.fillStyle='#8B949E'; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText(opts.pct?pct(val/100):yuan(val), pad.l-5, y+4);
  }
  cats.forEach((cat,ci)=>{
    const x=pad.l+ci*step+(step-bw)/2;
    let y=pad.t+ch;
    datasets.forEach(ds=>{
      const v=Math.abs(ds.data[ci]);
      const h=v/mx*ch;
      ctx.fillStyle=ds.color;
      ctx.fillRect(x,y-h,bw,h);
      y-=h;
    });
    ctx.fillStyle='#8B949E'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText(cat, x+bw/2, H-pad.b+16);
  });
  // legend
  let lx=pad.l;
  datasets.forEach(d=>{
    ctx.fillStyle=d.color; ctx.fillRect(lx,12,12,10);
    ctx.fillStyle='#8B949E'; ctx.font='10px sans-serif'; ctx.textAlign='left';
    ctx.fillText(d.label||'', lx+16, 21);
    lx+=ctx.measureText(d.label||'').width+36;
  });
}

function drawHorizBar(cv, labels, values, colors, opts={}){
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  const pad={t:10,r:80,b:10,l:160};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  const hasNeg=values.some(v=>v<0);
  const mx=Math.max(...values.map(Math.abs))*1.1||1;
  const mn=hasNeg?-mx:0;
  const bh=Math.min(22, ch/(labels.length+1));
  const step=ch/labels.length;
  const zero=pad.l+cw*(0-mn)/(mx-mn);
  if(hasNeg){
    ctx.strokeStyle='#484F58'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(zero,pad.t); ctx.lineTo(zero,pad.t+ch); ctx.stroke();
  }
  labels.forEach((lbl,i)=>{
    const v=values[i];
    const y=pad.t+i*step+(step-bh)/2;
    const x0=hasNeg?zero:pad.l;
    const blen=Math.abs(v)/(mx-mn)*cw;
    ctx.fillStyle=colors[i%colors.length]||'#58A6FF';
    if(v>=0) ctx.fillRect(x0, y, blen, bh);
    else ctx.fillRect(zero-blen, y, blen, bh);
    ctx.fillStyle='#8B949E'; ctx.font='11px sans-serif'; ctx.textAlign='right';
    ctx.fillText(lbl, pad.l-8, y+bh/2+4);
    ctx.fillStyle='#E6EDF3'; ctx.font='10px sans-serif'; ctx.textAlign='left';
    const valStr=opts.pct?pct(v):yuan(v);
    ctx.fillText(valStr, v>=0?x0+blen+4:zero-blen-45, y+bh/2+4);
  });
}

window.switchPnlTab=function(cat,btn){
  document.querySelectorAll('[id^=pnl-]').forEach(p=>p.classList.remove('active'));

  ];
  const fmt2=(v,fmt)=>!fmt||fmt==='num'?v!=null?Number(v).toLocaleString():'-':fmt==='yuan'?yuan(v):pct(v);
  // build rows: all 三级 for both years
  const rows26=[], rows25=[];
  CATS.forEach(cat=>{
    (Y26[cat]?.明细||[]).forEach(d=>rows26.push({...d,_cat:cat,_year:'26年'}));
    (Y25[cat]?.明细||[]).forEach(d=>rows25.push({...d,_cat:cat,_year:'25年'}));
  });
  const allRows=[...rows26,...rows25];

    <label>字段筛选：</label>

      }).join('')}
    </tr>`).join('')}
    </tbody>
  </table></div>
  `;
}
window.filterDetail=function(){
  const year=document.getElementById('fil-year').value;
  const cat=document.getElementById('fil-cat').value;
  const search=document.getElementById('fil-search').value.toLowerCase();
  document.querySelectorAll('#detail-body tr').forEach(tr=>{
    const y=tr.dataset.year, c=tr.dataset.cat;
    const show=(!year||y===year)&&(!cat||c===cat);
    tr.style.display=show?'':'none';
  });
  // field search
  if(search){
    document.querySelectorAll('[id^=dh-]').forEach(th=>{
      const key=th.id.replace('dh-','');
      const show=th.textContent.toLowerCase().includes(search)||key.includes(search);
      // hide column by index
    });
  }
};
