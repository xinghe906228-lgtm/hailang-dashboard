const NUMKEYS = ["sales","cost","gp","sfTotal","adv","taxFee","otherPromo","netGP","mgmt","netProfit","logistics","salary","pkg","rent","express","csSalary","teamSalary","stock"];

function mergeGroup(raw, group, newCat) {
  const rows = raw.filter(r=>r.group===group);
  if (!rows.length) return null;
  const m = {cat:newCat, group};
  NUMKEYS.forEach(k=>{ m[k]=rows.reduce((s,r)=>s+(r[k]||0),0); });
  return m;
}
function buildData(raw) {
  return [
    mergeGroup(raw,"耳塞","耳塞"),
    raw.find(r=>r.cat==="鼻夹"),
    mergeGroup(raw,"浮板","浮板"),
    ...raw.filter(r=>r.group==="其他")
  ].filter(Boolean);
}

const D25 = buildData(RAW25);
const D26 = buildData(RAW26);
const CATS = ["耳塞","鼻夹","浮板"];
const CAT_COLORS = {"耳塞":"#4A90D9","鼻夹":"#E07B54","浮板":"#52C37F","漂浮袋":"#9B6DE0","潜水装备":"#F0C040","沙滩鞋":"#E85F8A"};
const Y25C="#5B8DB8", Y26C="#E07B54", GREEN="#52C37F", RED="#E05454", ACCENT="#58A6FF";

const g25 = cat=>D25.find(r=>r.cat===cat);
const g26 = cat=>D26.find(r=>r.cat===cat);

const fmtMoney = v => v==null||isNaN(v)?"—":`¥${Math.round(Math.abs(v)).toLocaleString("zh-CN")}`;
const fmtPct = v => v==null||isNaN(v)?"—":`${(v*100).toFixed(1)}%`;
const fmtPctRaw = v => v==null||isNaN(v)?"—":`${v.toFixed(1)}%`;
const sign = v => v>=0?"+":"";
const chgColor = (v, inv=false) => (inv ? v<0 : v>0) ? GREEN : RED;

// ═══════════════════════════════════════════════
// CANVAS CHART HELPERS
// ═══════════════════════════════════════════════
const DPR = window.devicePixelRatio||1;

function initCanvas(id, w, h) {
  const c = document.getElementById(id);
  c.width = w * DPR; c.height = h * DPR;
  c.style.width = w+"px"; c.style.height = h+"px";
  const ctx = c.getContext("2d");
  ctx.scale(DPR, DPR);
  return ctx;
}

function drawBarChart(ctx, W, H, data, keys, colors, opts={}) {
  const pad = opts.pad||{top:20,right:10,bottom:30,left:52};
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;
  ctx.clearRect(0,0,W,H);

  const allVals = data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV = Math.max(...allVals, 1);
  const minV = Math.min(...allVals, 0);
  const range = maxV - minV;

  // grid lines
  const steps = 4;
  ctx.strokeStyle = "#30363D"; ctx.lineWidth = 0.5;
  ctx.fillStyle = "#8B949E"; ctx.font = `${9*1}px monospace`;
  for (let i=0;i<=steps;i++) {
    const v = minV + range*(steps-i)/steps;
    const y = pad.top + ch*i/steps;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+cw, y); ctx.stroke();
    const label = opts.pct ? `${v.toFixed(0)}%` : (Math.abs(v)>=1000?`¥${(v/1000).toFixed(0)}k`:`¥${v.toFixed(0)}`);
    ctx.fillStyle="#8B949E"; ctx.textAlign="right"; ctx.fillText(label, pad.left-4, y+3);
  }

  // zero line
  if (minV < 0) {
    const y0 = pad.top + ch*(maxV/range);
    ctx.strokeStyle="#555"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.left,y0); ctx.lineTo(pad.left+cw,y0); ctx.stroke();
  }

  const nGroups = data.length;
  const nBars = keys.length;
  const groupW = cw / nGroups;
  const barW = Math.min((groupW * 0.7) / nBars, 28);
  const groupGap = (groupW - barW*nBars) / 2;

  const y0 = pad.top + ch*(maxV/range);

  data.forEach((d,gi) => {
    const gx = pad.left + gi*groupW;
    keys.forEach((k,ki) => {
      const v = d[k]||0;
      const barH = Math.abs(v)/range * ch;
      const x = gx + groupGap + ki*barW;
      const y = v>=0 ? y0-barH : y0;
      ctx.fillStyle = colors[ki];
      ctx.beginPath();
      const r = 2;
      if (v>=0) {
        ctx.moveTo(x+r,y); ctx.lineTo(x+barW-r,y); ctx.quadraticCurveTo(x+barW,y,x+barW,y+r);
        ctx.lineTo(x+barW,y+barH); ctx.lineTo(x,y+barH); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
      } else {
        ctx.moveTo(x,y); ctx.lineTo(x+barW,y); ctx.lineTo(x+barW,y+barH-r); ctx.quadraticCurveTo(x+barW,y+barH,x+barW-r,y+barH);
        ctx.lineTo(x+r,y+barH); ctx.quadraticCurveTo(x,y+barH,x,y+barH-r); ctx.lineTo(x,y);
      }
      ctx.closePath(); ctx.fill();
    });
    // x label
    ctx.fillStyle="#8B949E"; ctx.font=`${10}px sans-serif`; ctx.textAlign="center";
    ctx.fillText(d.cat||d.label||"", gx+groupW/2, H-pad.bottom+14);
  });

  // legend
  if (opts.legend) {
    opts.legend.forEach((l,i)=>{
      const lx = pad.left + i*90;
      ctx.fillStyle = colors[i];
      ctx.fillRect(lx, H-12, 10, 8);
      ctx.fillStyle="#8B949E"; ctx.font="9px sans-serif"; ctx.textAlign="left";
      ctx.fillText(l, lx+13, H-5);
    });
  }

  // ref line
  if (opts.refLine != null) {
    const ry = pad.top + ch*(maxV-opts.refLine)/range;
    ctx.strokeStyle=opts.refLineColor||RED; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(pad.left,ry); ctx.lineTo(pad.left+cw,ry); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=opts.refLineColor||RED; ctx.font="9px sans-serif"; ctx.textAlign="left";
    ctx.fillText(opts.refLineLabel||"", pad.left+cw+2, ry+3);
  }
}

function drawStackedBar(ctx, W, H, data, keys, colors, opts={}) {
  const pad = opts.pad||{top:20,right:10,bottom:30,left:52};
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;
  ctx.clearRect(0,0,W,H);

  const totals = data.map(d=>keys.reduce((s,k)=>s+(d[k]||0),0));
  const maxV = Math.max(...totals, 1);

  // grid
  for (let i=0;i<=4;i++) {
    const v = maxV*(4-i)/4;
    const y = pad.top + ch*i/4;
    ctx.strokeStyle="#30363D"; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cw,y); ctx.stroke();
    ctx.fillStyle="#8B949E"; ctx.font="9px monospace"; ctx.textAlign="right";
    const label = Math.abs(v)>=1000?`¥${(v/1000).toFixed(0)}k`:`¥${v.toFixed(0)}`;
    ctx.fillText(label, pad.left-4, y+3);
  }

  const barW = Math.min(cw/data.length*0.5, 40);

  data.forEach((d,i)=>{
    const x = pad.left + (i+0.5)*cw/data.length - barW/2;
    let cumH = 0;
    keys.forEach((k,ki)=>{
      const v = d[k]||0;
      const bh = v/maxV*ch;
      const y = pad.top + ch - cumH - bh;
      ctx.fillStyle = colors[ki];
      ctx.fillRect(x, y, barW, bh);
      cumH += bh;
    });
    ctx.fillStyle="#8B949E"; ctx.font="10px sans-serif"; ctx.textAlign="center";
    ctx.fillText(d.cat||d.label||"", pad.left+(i+0.5)*cw/data.length, H-pad.bottom+14);
  });

  if (opts.legend) {
    opts.legend.forEach((l,i)=>{
      const lx = pad.left + i*75;
      ctx.fillStyle=colors[i]; ctx.fillRect(lx,H-12,10,8);
      ctx.fillStyle="#8B949E"; ctx.font="9px sans-serif"; ctx.textAlign="left";
      ctx.fillText(l, lx+13, H-5);
    });
  }
}

function drawPie(ctx, W, H, data, opts={}) {
  const cx=W/2, cy=H/2-10, r=Math.min(W,H)/2-40;
  ctx.clearRect(0,0,W,H);
  const total = data.reduce((s,d)=>s+d.value,0);
  let angle = -Math.PI/2;
  data.forEach(d=>{
    const slice = d.value/total * Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+slice);
    ctx.closePath(); ctx.fillStyle=d.color; ctx.fill();
    // label
    const mid = angle + slice/2;
    const lx = cx + Math.cos(mid)*(r*0.65);
    const ly = cy + Math.sin(mid)*(r*0.65);
    if (slice > 0.15) {
      ctx.fillStyle="#fff"; ctx.font="bold 10px sans-serif"; ctx.textAlign="center";
      ctx.fillText(`${(d.value/total*100).toFixed(0)}%`, lx, ly);
    }
    angle += slice;
  });
  // legend
  data.forEach((d,i)=>{
    const lx = 8, ly = H - data.length*14 + i*14;
    ctx.fillStyle=d.color; ctx.fillRect(lx,ly-8,10,8);
    ctx.fillStyle="#8B949E"; ctx.font="10px sans-serif"; ctx.textAlign="left";
    ctx.fillText(`${d.name} ¥${Math.round(d.value/1000)}k`, lx+13, ly);
  });
}

function drawRadar(ctx, W, H, series, labels, opts={}) {
  const cx=W/2, cy=H/2, r=Math.min(W,H)/2-40;
  ctx.clearRect(0,0,W,H);
  const n = labels.length;
  const angle = i => (i/n)*Math.PI*2 - Math.PI/2;

  // grid
  for (let ring=1;ring<=4;ring++) {
    ctx.beginPath();
    for (let i=0;i<n;i++) {
      const a=angle(i), rr=r*ring/4;
      i===0 ? ctx.moveTo(cx+Math.cos(a)*rr, cy+Math.sin(a)*rr) : ctx.lineTo(cx+Math.cos(a)*rr, cy+Math.sin(a)*rr);
    }
    ctx.closePath(); ctx.strokeStyle="#30363D"; ctx.lineWidth=0.5; ctx.stroke();
  }
  // axes
  for (let i=0;i<n;i++) {
    const a=angle(i);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    ctx.strokeStyle="#30363D"; ctx.lineWidth=0.5; ctx.stroke();
    // label
    const lx=cx+Math.cos(a)*(r+16), ly=cy+Math.sin(a)*(r+16);
    ctx.fillStyle="#8B949E"; ctx.font="10px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(labels[i], lx, ly);
  }

  series.forEach(s=>{
    ctx.beginPath();
    s.vals.forEach((v,i)=>{
      const a=angle(i), rr=r*Math.max(0,Math.min(1,v));
      i===0 ? ctx.moveTo(cx+Math.cos(a)*rr, cy+Math.sin(a)*rr) : ctx.lineTo(cx+Math.cos(a)*rr, cy+Math.sin(a)*rr);
    });
    ctx.closePath();
    ctx.strokeStyle=s.color; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle=s.color+"33"; ctx.fill();
  });
  ctx.textBaseline="alphabetic";
}

let compareCat = "耳塞";
function buildCompare() {
  const btnHtml = CATS.map(c=>`<button class="btn-pill${c===compareCat?" active":""}" onclick="setCompareCat('${c}')">${c}</button>`).join("");

  const metrics = [
    {label:"含税销售额",key:"sales"},{label:"货品销售成本",key:"cost",inv:true},
    {label:"销售毛利",key:"gp"},{label:"毛利率",key:"gp",key2:"sales",pct:true},
    {label:"销售费用合计",key:"sfTotal",inv:true},{label:"推广费",key:"adv",inv:true},
    {label:"平台费用",key:"taxFee",inv:true},{label:"其他推广",key:"otherPromo",inv:true},
    {label:"净毛利",key:"netGP"},{label:"净毛利率",key:"netGP",key2:"sales",pct:true},
    {label:"管理费用",key:"mgmt",inv:true},{label:"净利润",key:"netProfit"},
    {label:"净利率",key:"netProfit",key2:"sales",pct:true},
    {label:"物流成本",key:"logistics",inv:true},{label:"工资合计",key:"salary",inv:true},
    {label:"包装耗材",key:"pkg",inv:true},{label:"仓租费",key:"rent",inv:true},{label:"快递费",key:"express",inv:true},
  ];

  const d25=g25(compareCat), d26=g26(compareCat);
  const rows = metrics.map((m,i)=>{
    let v25,v26;
    if(m.pct){v25=d25?(d25[m.key]/d25[m.key2]):null;v26=d26?(d26[m.key]/d26[m.key2]):null;}
    else{v25=d25?d25[m.key]:null;v26=d26?d26[m.key]:null;}
    const delta=v25!=null&&v26!=null?v26-v25:null;
    const pctChg=delta!=null&&v25?(delta/Math.abs(v25)*100):null;
    const isGood=m.inv?delta<0:delta>0;
    const cc=delta==null?"#8B949E":isGood?GREEN:RED;
    const bg=i%2===0?"":"background:#0D1117";
    const fmt=m.pct?fmtPct:fmtMoney;
    return `<tr style="${bg}">
      <td class="l" style="color:#E6EDF3">${m.label}</td>
      <td class="r mono" style="color:${Y25C}">${fmt(v25)}</td>
      <td class="r mono" style="color:${Y26C}">${fmt(v26)}</td>
      <td class="r mono" style="color:${cc}">${delta!=null?sign(delta)+(m.pct?`${(delta*100).toFixed(1)}%`:fmtMoney(delta)):"—"}</td>
      <td class="r mono" style="color:${cc}">${pctChg!=null?sign(pctChg)+pctChg.toFixed(1)+"%":"—"}</td>
    </tr>`;
  }).join("");

  // radar
  const radarLabels=["销售额","毛利","净利","推广费","物流费","人工费"];
  const radarKeys=["sales","gp","netProfit","adv","logistics","salary"];

  return `
    <div class="btn-group">${btnHtml}</div>
    <div class="grid2 mb16">
      <div class="card" style="overflow:auto">
        <table class="tbl">
          <thead><tr>
            <th class="l">指标</th>
            <th class="r" style="color:${Y25C}">2025年2月</th>
            <th class="r" style="color:${Y26C}">2026年2月</th>
            <th class="r">变动额</th>
            <th class="r">变动%</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div>
        <div class="card mb14" style="height:280px">
          <div class="card-title">${compareCat} 综合雷达图</div>
          <canvas id="c_radar" style="width:100%;height:220px"></canvas>
        </div>
        <div class="grid2">
          ${radarKeys.map((k,i)=>{
            const d25v=d25?d25[k]:0,d26v=d26?d26[k]:0;
            const chg=d25v?(d26v-d25v)/Math.abs(d25v)*100:0;
            return `<div class="stat-box"><div class="stat-label">${radarLabels[i]}</div>
              <div style="color:${Y26C};font-weight:700">${fmtMoney(d26v)}</div>
              <div style="font-size:10px;color:${chg>=0?GREEN:RED}">${sign(chg)}${chg.toFixed(1)}% YoY</div></div>`;
          }).join("")}
        </div>
      </div>
    </div>`;
}

let pnlYear=2026;
function buildPnL() {
  const data = pnlYear===2026 ? D26 : D25.filter(r=>CATS.includes(r.cat));
  const yearBtns = [2025,2026].map(y=>`<button class="btn-pill${y===pnlYear?" active":""}" onclick="setPnLYear(${y})">${y}年</button>`).join("");

  const pnlRows = [

    {label:"(减) 货品销售成本",key:"cost",neg:true,indent:true},
    {label:"销售毛利",key:"gp",bold:true,bg:"#0a1a0a"},
    {label:"  毛利率",pctOf:["gp","sales"],indent:true,muted:true},
    {label:"(减) 销售费用合计",key:"sfTotal",neg:true},
    {label:"  推广费",key:"adv",neg:true,indent:true},
    {label:"  平台费用",key:"taxFee",neg:true,indent:true},
    {label:"  其他推广",key:"otherPromo",neg:true,indent:true},
    {label:"净毛利",key:"netGP",bold:true,bg:"#0a1a0a"},
    {label:"  净毛利率",pctOf:["netGP","sales"],indent:true,muted:true},
    {label:"(减) 管理费用",key:"mgmt",neg:true},
    {label:"净利润",key:"netProfit",bold:true,bg:"#0a0a1a",sep:true},
    {label:"  净利率",pctOf:["netProfit","sales"],indent:true,muted:true},
  ];

  const catCols = CATS.map(cat=>{const d=data.find(r=>r.cat===cat);return d;});
  const totals = pnlRows.map(row=>{
    if(row.pctOf) return null;
    return catCols.reduce((s,d)=>s+(d?d[row.key]||0:0),0);
  });

  const rowsHtml = pnlRows.map((row,ri)=>{
    const bg = row.bg||"";
    const sepStyle = row.sep?"border-top:1px solid rgba(88,166,255,.3)":"";
    const cells = catCols.map(d=>{
      if(!d) return `<td class="r mono">—</td>`;
      let v;
      if(row.pctOf) v=d[row.pctOf[1]]?d[row.pctOf[0]]/d[row.pctOf[1]]:null;
      else v=d[row.key]??null;
      const cc = row.pctOf ? "#E6EDF3" : v==null?"#8B949E":v<0?RED:"#E6EDF3";
      return `<td class="r mono" style="color:${cc};font-weight:${row.bold?700:400}">${row.pctOf?fmtPct(v):fmtMoney(v)}</td>`;
    }).join("");
    const tot = totals[ri];
    const totCell = tot==null?`<td class="r mono muted">—</td>`:
      `<td class="r mono" style="color:${tot<0?RED:GREEN};font-weight:700">${fmtMoney(tot)}</td>`;
    return `<tr style="background:${bg};${sepStyle}">
      <td class="l" style="padding-left:${row.indent?24:12}px;color:${row.muted?"#8B949E":row.bold?"#E6EDF3":"#C8D3DC"};font-weight:${row.bold?700:400}">${row.label}</td>

  const wfCharts = CATS.map(cat=>`

  return `

          <th class="r" style="color:${ACCENT}">合计</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
    <div class="grid3">${wfCharts}</div>`;
}

function setPnLYear(y){pnlYear=y;const pg=document.getElementById("page-pnl");pg.innerHTML=buildPnL();renderPnLCharts();}

function renderPnLCharts() {
  const data = pnlYear===2026 ? D26 : D25.filter(r=>CATS.includes(r.cat));
  CATS.forEach(cat=>{
    const c=document.getElementById(`c_wf_${cat}`);
    if(!c) return;
    const d=data.find(r=>r.cat===cat);
    if(!d) return;
    const W=c.parentElement.clientWidth||300;
    const ctx=initCanvas(`c_wf_${cat}`,W,220);
    const items=[
      {label:"销售额",v:d.sales,color:GREEN},
      {label:"(货品成本)"  ,v:-d.cost,color:RED},
      {label:"毛利",v:d.gp,color:ACCENT},
      {label:"(推广费)",v:-d.adv,color:RED},
      {label:"(平台费)",v:-d.taxFee,color:"#E07B54"},
      {label:"净毛利",v:d.netGP,color:ACCENT},
      {label:"(管理费)",v:-d.mgmt,color:RED},
      {label:"净利润",v:d.netProfit,color:d.netProfit>=0?GREEN:RED},
    ];
    const pad={top:10,right:8,bottom:30,left:8};
    const cw=W-pad.left-pad.right,ch=220-pad.top-pad.bottom;
    ctx.clearRect(0,0,W,220);
    const allV=[...items.map(x=>x.v),0];
    const maxV=Math.max(...allV),minV=Math.min(...allV);
    const range=maxV-minV||1;
    const bw=cw/items.length*0.6;
    items.forEach((item,i)=>{
      const x=pad.left+(i+0.5)*cw/items.length-bw/2;
      const bh=Math.abs(item.v)/range*ch;
      const y0=pad.top+ch*maxV/range;
      const y=item.v>=0?y0-bh:y0;
      ctx.fillStyle=item.color; ctx.fillRect(x,y,bw,bh);
      ctx.fillStyle="#8B949E"; ctx.font="8px sans-serif"; ctx.textAlign="center";
      ctx.fillText(item.label,x+bw/2,220-pad.bottom+12);
      // value label
      const vLabel=Math.abs(item.v)>=1000?`${(item.v/1000).toFixed(1)}k`:item.v.toFixed(0);
      ctx.fillStyle="#E6EDF3"; ctx.font="8px monospace";
      ctx.fillText(vLabel,x+bw/2,item.v>=0?y-3:y+bh+10);
    });
  });
}

function buildProfit() {
  const matrix=CATS.map(cat=>{
    const d25=g25(cat),d26=g26(cat);
    return {cat,
      gp25:d25?+(d25.gp/d25.sales*100).toFixed(1):null,gp26:d26?+(d26.gp/d26.sales*100).toFixed(1):null,
      np25:d25?+(d25.netProfit/d25.sales*100).toFixed(1):null,np26:d26?+(d26.netProfit/d26.sales*100).toFixed(1):null,
      ngp25:d25?+(d25.netGP/d25.sales*100).toFixed(1):null,ngp26:d26?+(d26.netGP/d26.sales*100).toFixed(1):null,
    };
  });
  const cell=(v)=>{
    const cc=v==null?"#8B949E":v>0?GREEN:v<-10?RED:Y26C;
    const bg=v==null?"":v>0?"#052a0a":v<-10?"#2a0505":"";
    return `<td class="c mono" style="color:${cc};background:${bg};font-weight:700">${v==null?"—":v.toFixed(1)+"%"}</td>`;
  };
  const tblRows=matrix.map(m=>{
    const gpD=m.gp26-m.gp25,ngpD=m.ngp26-m.ngp25,npD=m.np26-m.np25;
    return `<tr><td class="l" style="color:${CAT_COLORS[m.cat]};font-weight:700">${m.cat}</td>
      ${cell(m.gp25)}${cell(m.gp26)}${cell(gpD)}
      ${cell(m.ngp25)}${cell(m.ngp26)}${cell(ngpD)}
      ${cell(m.np25)}${cell(m.np26)}${cell(npD)}
    </tr>`;
  }).join("");
  return `
    <div class="card mb16" style="overflow:auto">
      <div class="card-title">盈利能力矩阵</div>
      <table class="tbl">
        <thead><tr>
          <th class="l">品类</th>
          <th class="c" style="color:${Y25C}">25毛利率</th><th class="c" style="color:${Y26C}">26毛利率</th><th class="c">变动</th>
          <th class="c" style="color:${Y25C}">25净毛利率</th><th class="c" style="color:${Y26C}">26净毛利率</th><th class="c">变动</th>
          <th class="c" style="color:${Y25C}">25净利率</th><th class="c" style="color:${Y26C}">26净利率</th><th class="c">变动</th>
        </tr></thead>
        <tbody>${tblRows}</tbody>
      </table>
    </div>
    <div class="grid2">
      <div class="card"><div class="card-title">毛利率 & 净利率对比</div><canvas id="c_margin_bar" style="width:100%;height:220px"></canvas></div>
      <div class="card"><div class="card-title">2026 销售费率 vs 净利率</div><canvas id="c_scatter" style="width:100%;height:220px"></canvas></div>
    </div>`;
}

function renderProfitCharts(){
  const c1=document.getElementById("c_margin_bar");
  if(c1){const W=c1.parentElement.clientWidth||400;const ctx=initCanvas("c_margin_bar",W,220);
    const data=CATS.map(c=>({cat:c,"25毛利率":g25(c)?+(g25(c).gp/g25(c).sales*100).toFixed(1):0,"26毛利率":g26(c)?+(g26(c).gp/g26(c).sales*100).toFixed(1):0,"25净利率":g25(c)?+(g25(c).netProfit/g25(c).sales*100).toFixed(1):0,"26净利率":g26(c)?+(g26(c).netProfit/g26(c).sales*100).toFixed(1):0}));
    drawBarChart(ctx,W,220,data,["25毛利率","26毛利率","25净利率","26净利率"],[Y25C,Y26C,"#82ca9d","#ff7b7b"],{pct:true,legend:["25毛利","26毛利","25净利","26净利"]});}

  const c2=document.getElementById("c_scatter");
  if(c2){
    const W=c2.parentElement.clientWidth||400,H=220;
    const ctx=initCanvas("c_scatter",W,H);
    const pad={top:20,right:20,bottom:36,left:44};
    const pts=CATS.map(c=>{const d=g26(c);return d?{cat:c,x:+(d.sfTotal/d.sales*100).toFixed(1),y:+(d.netProfit/d.sales*100).toFixed(1),r:Math.sqrt(d.sales/50)}:null;}).filter(Boolean);
    ctx.clearRect(0,0,W,H);
    const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
    const xMin=Math.min(...xs)-5,xMax=Math.max(...xs)+5;
    const yMin=Math.min(...ys)-5,yMax=Math.max(...ys)+5;
    const cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
    // axes
    ctx.strokeStyle="#30363D";ctx.lineWidth=0.5;
    for(let i=0;i<=4;i++){
      const y=pad.top+ch*i/4;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();
      const v=yMax-(yMax-yMin)*i/4;ctx.fillStyle="#8B949E";ctx.font="9px monospace";ctx.textAlign="right";ctx.fillText(v.toFixed(0)+"%",pad.left-3,y+3);
    }
    for(let i=0;i<=4;i++){
      const x=pad.left+cw*i/4;ctx.beginPath();ctx.moveTo(x,pad.top);ctx.lineTo(x,pad.top+ch);ctx.stroke();
      const v=xMin+(xMax-xMin)*i/4;ctx.fillStyle="#8B949E";ctx.font="9px monospace";ctx.textAlign="center";ctx.fillText(v.toFixed(0)+"%",x,H-pad.bottom+12);
    }
    // zero line
    const y0=pad.top+ch*(yMax/(yMax-yMin));
    ctx.strokeStyle=RED;ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(pad.left,y0);ctx.lineTo(pad.left+cw,y0);ctx.stroke();ctx.setLineDash([]);
    // points
    pts.forEach(p=>{
      const px=pad.left+(p.x-xMin)/(xMax-xMin)*cw;
      const py=pad.top+(yMax-p.y)/(yMax-yMin)*ch;
      ctx.beginPath();ctx.arc(px,py,Math.max(p.r,6),0,Math.PI*2);
      ctx.fillStyle=(CAT_COLORS[p.cat]||ACCENT)+"88";ctx.fill();
      ctx.strokeStyle=CAT_COLORS[p.cat]||ACCENT;ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle="#E6EDF3";ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.fillText(p.cat,px,py-Math.max(p.r,6)-3);
    });
    ctx.fillStyle="#8B949E";ctx.font="9px sans-serif";ctx.textAlign="center";ctx.fillText("销售费率%",pad.left+cw/2,H-2);
  }
}

  const c1=document.getElementById("c_inv_bar");
  if(c1){const W=c1.parentElement.clientWidth||400;const ctx=initCanvas("c_inv_bar",W,200);
    drawBarChart(ctx,W,200,skus.map(s=>({cat:s,"25库存":inv25[s]||0,"26库存":inv26[s]||0})),["25库存","26库存"],[Y25C,Y26C],{legend:["2025","2026"]});}
  const c2=document.getElementById("c_turnover");
  if(c2){const W=c2.parentElement.clientWidth||400;const ctx=initCanvas("c_turnover",W,200);
    drawBarChart(ctx,W,200,CATS.map(c=>({cat:c,"25周转":g25(c)&&g25(c).stock?+(g25(c).sales/g25(c).stock).toFixed(2):0,"26周转":g26(c)&&g26(c).stock?+(g26(c).sales/g26(c).stock).toFixed(2):0})),["25周转","26周转"],[Y25C,Y26C],{legend:["2025","2026"]});}
}

// ── 数据明细 ──────────────────────────────────
let detailYear="全部",detailCat="全部",detailSort="sales",detailDir="desc";
function buildDetail(){
  const allData=[...D25.map(r=>({...r,year:2025})),...D26.map(r=>({...r,year:2026}))];
  const allCats=[...new Set(allData.map(r=>r.cat))];
  const filtered=allData
    .filter(r=>detailYear==="全部"||r.year===parseInt(detailYear))
    .filter(r=>detailCat==="全部"||r.cat===detailCat)
    .sort((a,b)=>detailDir==="desc"?(b[detailSort]||0)-(a[detailSort]||0):(a[detailSort]||0)-(b[detailSort]||0));

  const cols=[
    {key:"year",label:"年份"},{key:"cat",label:"品类"},{key:"sales",label:"含税销售额"},
    {key:"cost",label:"货品成本"},{key:"gp",label:"销售毛利"},{key:"sfTotal",label:"销售费用"},
    {key:"adv",label:"推广费"},{key:"taxFee",label:"平台费用"},{key:"netGP",label:"净毛利"},
    {key:"mgmt",label:"管理费用"},{key:"netProfit",label:"净利润"},
    {key:"logistics",label:"物流"},{key:"salary",label:"工资"},{key:"stock",label:"库存"},
  ];

  const yearBtns=["全部","2025","2026"].map(y=>`<button class="btn-pill${y===detailYear?" active":""}" onclick="setDetailFilter('year','${y}')">${y}</button>`).join("");
  const catBtns=["全部",...allCats].map(c=>`<button class="btn-pill${c===detailCat?" active":""}" onclick="setDetailFilter('cat','${c}')">${c}</button>`).join("");

  const thStyle=(k)=>`style="cursor:pointer;color:${detailSort===k?ACCENT:"#8B949E"};text-align:${k==="cat"||k==="year"?"left":"right"}"`;
  const ths=cols.map(c=>`<th class="${c.key==="cat"||c.key==="year"?"l":"r"}" ${thStyle(c.key)} onclick="setDetailSort('${c.key}')">${c.label}${detailSort===c.key?(detailDir==="desc"?" ↓":" ↑"):""}</th>`).join("");

  const rows=filtered.map((row,i)=>{
    const bg=i%2===0?"":"background:#0D1117";
    const cells=cols.map(col=>{
      let v=row[col.key],cc="#E6EDF3",fw=400;
      if(col.key==="year")cc=row.year===2025?Y25C:Y26C;
      else if(col.key==="cat")cc=CAT_COLORS[row.cat]||ACCENT;
      else if(col.key==="netProfit"){cc=v<0?RED:GREEN;fw=700;}
      const display=col.key==="year"?row.year:col.key==="cat"?row.cat:col.key==="stock"?(v||0).toLocaleString():fmtMoney(v);
      return `<td class="${col.key==="cat"||col.key==="year"?"l":"r"} mono" style="color:${cc};font-weight:${fw}">${display}</td>`;
    }).join("");
    return `<tr style="${bg}">${cells}</tr>`;
  }).join("");

  return `
    <div class="btn-group" style="margin-bottom:8px">
      <span class="muted" style="font-size:12px;line-height:28px">年份:</span>${yearBtns}
    </div>
    <div class="btn-group mb16">
      <span class="muted" style="font-size:12px;line-height:28px">品类:</span>${catBtns}
    </div>
    <div class="card" style="overflow:auto">
      <table class="tbl" style="min-width:900px">
        <thead><tr>${ths}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="muted" style="font-size:11px;margin-top:8px">共 ${filtered.length} 条记录 · 点击列标题可排序</div>`;
}

function setDetailFilter(type,val){
  if(type==="year")detailYear=val;else detailCat=val;
  document.getElementById("page-detail").innerHTML=buildDetail();
}
function setDetailSort(key){
  if(detailSort===key)detailDir=detailDir==="desc"?"asc":"desc";
  else{detailSort=key;detailDir="desc";}
  document.getElementById("page-detail").innerHTML=buildDetail();
}

// ═══════════════════════════════════════════════
// TABS SYSTEM
// ═══════════════════════════════════════════════
const TABS = [
  {id:"overview",  label:"📊 总览",       build:buildOverview,  render:renderOverviewCharts},
  {id:"compare",   label:"⚖️ 品类对比",   build:buildCompare,   render:renderCompareCharts},
  {id:"pnl",       label:"💰 损益分析",   build:buildPnL,       render:renderPnLCharts},
  {id:"cost",      label:"🏷 费用结构",   build:buildCost,      render:renderCostCharts},
  {id:"marketing", label:"📣 推广分析",   build:buildMarketing, render:renderMarketingCharts},
  {id:"profit",    label:"📈 盈利能力",   build:buildProfit,    render:renderProfitCharts},
  {id:"logistics", label:"🚚 物流仓储",   build:buildLogistics, render:renderLogisticsCharts},
  {id:"salary",    label:"👥 人员薪资",   build:buildSalary,    render:renderSalaryCharts},
  {id:"inventory", label:"📦 库存分析",   build:buildInventory, render:renderInventoryCharts},
  {id:"detail",    label:"📋 数据明细",   build:buildDetail,    render:()=>{}},
];

let activeTab = "overview";

function switchTab(id) {
  activeTab = id;
  // update nav
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===id));
  // update pages
  document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.id===`page-${id}`));
  // render charts after DOM is ready
  const tab = TABS.find(t=>t.id===id);
  if(tab?.render) setTimeout(tab.render, 50);
}

// Build nav
const nav = document.getElementById("nav");
TABS.forEach(t=>{
  const btn = document.createElement("button");
  btn.className = "nav-btn" + (t.id===activeTab?" active":"");
  btn.dataset.tab = t.id;
  btn.textContent = t.label;
  btn.onclick = ()=>switchTab(t.id);
  nav.appendChild(btn);
});

// Build pages
const pagesEl = document.getElementById("pages");
TABS.forEach(t=>{
  const pg = document.createElement("div");
  pg.className = "page" + (t.id===activeTab?" active":"");
  pg.id = `page-${t.id}`;

  const inner = document.createElement("div");
  inner.className = "content";
  inner.innerHTML = `<div class="section-header"><h2>${t.label}</h2><p>数据来源：26年2月海浪品类表单 &amp; 25年2月海浪品类数据表单 · 耳塞=成人+儿童耳塞 · 浮板=A字板+背漂</p></div>` + t.build();

  pg.appendChild(inner);
  pagesEl.appendChild(pg);
});

// Initial render
setTimeout(()=>TABS.find(t=>t.id===activeTab)?.render(), 100);

// Handle window resize
window.addEventListener("resize", ()=>{
  const tab = TABS.find(t=>t.id===activeTab);
  if(tab?.render) setTimeout(tab.render, 100);
});
</script>
</body>
</html>
